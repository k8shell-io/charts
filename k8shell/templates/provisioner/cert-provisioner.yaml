{{- if .Values.certManager.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: provisioner-cert
spec:
  secretName: provisioner-tls
  duration: {{ .Values.certManager.duration }}
  renewBefore: {{ .Values.certManager.renewBefore }}
  commonName: provisioner.{{ .Release.Namespace }}.svc.cluster.local
  dnsNames:
    - provisioner
    - provisioner.{{ .Release.Namespace }}.svc
    - provisioner.{{ .Release.Namespace }}.svc.cluster.local
  usages:
    - server auth
  issuerRef:
    name: {{ .Values.certManager.issuer.name }}
    kind: {{ .Values.certManager.issuer.kind }}
{{- end }}