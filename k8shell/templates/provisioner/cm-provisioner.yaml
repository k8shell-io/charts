{{- if not .Values.provisioner.targetNamespace }}
{{- fail "provisioner.targetNamespace is required and it must be an existing namespace name" }}
{{- end }}

apiVersion: v1
kind: ConfigMap
metadata:
  name: provisioner-config
  labels:
    app: provisioner
data:
  config.yaml: |
    targetNamespace: {{ .Values.provisioner.targetNamespace }}

    {{- if .Values.provisioner.injectNamespaces }}
    injectNamespaces:
    {{- range .Values.provisioner.injectNamespaces }}
      - {{ . }}
    {{- end }}
    {{- end }}

    {{- if .Values.provisioner.defaultRegistry.host }}
    defaultRegistry:
      host: ${DEFAULT_REGISTRY_HOST}
    {{- end }}

    {{- if .Values.provisioner.privateRegistry.enabled }}
    privateRegistry:
      host: ${PRIVATE_REGISTRY_HOST}
      {{- if .Values.provisioner.privateRegistry.cert }}
      certCA: !file /app/secrets/regcert.pem
      {{- end }}
      username: ${PRIVATE_REGISTRY_USERNAME}
      password: ${PRIVATE_REGISTRY_PASSWORD}
    {{- end }}

    k8shellCapabilities:
      apiServerEnabled: {{ .Values.apiServer.enabled }}
      saToken:
        enabled: {{ .Values.provisioner.saToken.enabled }}
        cacheTokens: {{ .Values.provisioner.saToken.cacheTokens }}
      shells:
        allowSessionDetach: {{ .Values.provisioner.shells.allowSessionDetach }}
        detachedTTL: {{ .Values.provisioner.shells.detachedTTL }}
        allowUnlimittedTTL: {{ .Values.provisioner.shells.allowUnlimittedTTL }}

    certManager:
      enabled: {{ .Values.certManager.enabled }}
      issuer:
        name: {{ .Values.certManager.issuer.name }}
        kind: {{ .Values.certManager.issuer.kind }}
      duration: {{ .Values.certManager.duration }}
      renewBefore: {{ .Values.certManager.renewBefore }}

    # grpc server
    grpc:
      port: 9030

      {{- if .Values.certManager.enabled }}
      enableTLS: true
      certFile: /etc/tls/provisioner/tls.crt
      keyFile: /etc/tls/provisioner/tls.key
      {{- else }}
      enableTLS: false
      {{- end }}

      # JWT required claims for authentication
      authEnabled: {{ .Values.authEnabled }}
      audience: provisioner
      allowed:
        - serviceAccount: ssh-proxy
        - serviceAccount: api-server

    nats:
      enabled: {{ .Values.nats.enabled }}
      url: nats://{{ .Values.nats.host }}:{{ .Values.nats.port }}
      username: {{ .Values.nats.username }}
      password: ${NATS_K8SHELL_PASSWORD}
      kv:
        provisionBucketTTL: {{ .Values.provisioner.nats.provisionBucketTTL }}

    # Identity service configuration
    identity:
      address: {{ if and .Values.grpc .Values.grpc.roundRobin }}dns:///identity:9020{{ else }}identity:9020{{ end }}
      tokenFilePath: /var/run/secrets/k8shell.io/identity
      {{- if .Values.certManager.enabled }}
      caCertPath: /etc/k8shell/ca/ca.crt
      serverName: identity.{{ .Release.Namespace }}.svc
      {{- end }}

    {{- if .Values.session.enabled }}
    # Session service configuration
    session:
      address: {{ if and .Values.grpc .Values.grpc.roundRobin }}dns:///session:9010{{ else }}session:9010{{ end }}
      tokenFilePath: /var/run/secrets/k8shell.io/session
      {{- if .Values.certManager.enabled }}
      caCertPath: /etc/k8shell/ca/ca.crt
      serverName: session.{{ .Release.Namespace }}.svc
      {{- end }}
    {{- end }}

    {{- if .Values.authz.enabled }}
    # authz service configuration
    authz:
      address: {{ if and .Values.grpc .Values.grpc.roundRobin }}dns:///authz:9011{{ else }}authz:9011{{ end }}
      tokenFilePath: /var/run/secrets/k8shell.io/authz
      {{- if .Values.certManager.enabled }}
      caCertPath: /etc/k8shell/ca/ca.crt
      serverName: authz.{{ .Release.Namespace }}.svc
      {{- end }}
    {{- end }}

    # JWT verifier configuration for validating tokens from remote identity providers
    jwtVerifier:
      signingMethod: ${JWT_SIGNING_METHOD}
      privateKeyFile: /run/secrets/jwt-issuer/private-key.pem

    # Blueprints configuration
    blueprints:
      directory: /app/blueprints
      defaultCustomBlueprint: {{ .Values.provisioner.defaultCustomBlueprint | default "base" }}
