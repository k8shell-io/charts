{{- if .Values.session.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: session
  labels:
    {{- include "k8shell.labels" . | nindent 4 }}
    app.kubernetes.io/component: session
spec:
  type: ClusterIP
  ports:
    - port: 9010
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    k8shell.io/app: session
{{- end }}