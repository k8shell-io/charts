{{- if .Values.apiServer.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: api-server
  labels:
    {{- include "k8shell.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-server
spec:
  type: ClusterIP
  ports:
    - port: 9101
      targetPort: http
      protocol: TCP
      name: http
  selector:
    k8shell.io/app: api-server
{{- end }}