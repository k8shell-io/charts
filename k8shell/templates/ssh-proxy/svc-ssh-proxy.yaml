{{- if .Values.sshProxy.loadBalancer.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: ssh-external  
  {{- if .Values.sshProxy.loadBalancer.annotations }}
  annotations:
    {{- toYaml .Values.sshProxy.loadBalancer.annotations | nindent 4 }}
  {{- end }}
  labels:
    {{- include "k8shell.labels" . | nindent 4 }}
    app.kubernetes.io/component: ssh-proxy
spec:
  ports:
    - protocol: TCP
      port: {{ .Values.sshProxy.loadBalancer.port }}
      targetPort: 2022
  type: LoadBalancer
  selector:
    k8shell.io/app: ssh-proxy
{{- end }}
---
{{- if .Values.sshProxy.nodePort.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: ssh-nodeport
  labels:
    {{- include "k8shell.labels" . | nindent 4 }}
    app.kubernetes.io/component: ssh-proxy
spec:
  type: NodePort
  ports:
    - port: 22
      protocol: TCP
      targetPort: 2022
      nodePort: {{ .Values.sshProxy.nodePort.port }}
      name: ssh
  selector:
    k8shell.io/app: ssh-proxy
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: ssh-internal
  labels:
    {{- include "k8shell.labels" . | nindent 4 }}
    app.kubernetes.io/component: ssh-proxy
spec:
  type: ClusterIP
  ports:
    - port: 22
      protocol: TCP
      targetPort: 2022
      name: ssh
  selector:
    k8shell.io/app: ssh-proxy