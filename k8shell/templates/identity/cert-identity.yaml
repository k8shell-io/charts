{{- if .Values.certManager.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: identity-cert
spec:
  secretName: identity-tls
  duration: {{ .Values.certManager.duration }}
  renewBefore: {{ .Values.certManager.renewBefore }}
  commonName: identity.{{ .Release.Namespace }}.svc.cluster.local
  dnsNames:
    - identity
    - identity.{{ .Release.Namespace }}.svc
    - identity.{{ .Release.Namespace }}.svc.cluster.local
  usages:
    - server auth
  issuerRef:
    name: {{ .Values.certManager.issuer.name }}
    kind: {{ .Values.certManager.issuer.kind }}
{{- end }}