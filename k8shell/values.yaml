# values.yaml for k8shell Helm chart
#
# This file contains the default values for all configurable parameters of the
# k8shell Helm chart. Users can override these values by providing their own
# values.yaml file or by using --set during helm install/upgrade commands.
#
# NOTE on usernames/passwords:
# usernames and passwords are provided as env variables in Pods.
# When a field with name "field1" has a value of {}, there can be following
# options:
#
# 1. field1.value: the actual value will be used to create a Kubernetes secret
#    with key equal to env variable name. For example, see
#    templates/identity/sec-identity.yaml how the secret is created and
#    templates/identity/dep-identity.yaml how the secret is consumed using
#    k8shell.secretEnv helper function.
#
# 2. field1.secretName and field1.secretKey - this will use an existing
#    Kubernetes secret with the specified name and key

# imageRegistry defines a private container registry used to create an image pull secret (regcred).
imageRegistry: 
  host: ""

  # only one of username/password or existingSecret should be set
  username: ""
  password: ""
  existingSecret: ""

# Enable JWT authentication for all services
authEnabled: true

# JWT token expiration time for all services, in seconds
tokenExpiration: 600

# Enable cert-manager to issue TLS certificates for the services.
# This requires cert-manager to be installed in the cluster and a
# ClusterIssuer configured referring a CA issuer such as HashiCorp Vault or
# cert-manager's own CA issuer. If cert-manager is not enabled, TLS will be
# disabled for all services and they will fall back to plaintext communication
certManager:
  enabled: false
  issuer:
    name: vault-root-issuer
    kind: ClusterIssuer
  duration: 24h
  renewBefore: 12h

grpc:
  # enables client-side load balancing for gRPC communication between services.
  # this will make services that expose grpc api to use headless 
  roundRobin: true

# sshProxy is the SSH proxy service that handles incoming SSH connections
sshProxy:
  replicas: 1
  
  image:
    repository: ghcr.io/k8shell-io/ssh-proxy
    tag: v0.13.4
  
  proxyProtocol: false
  
  writerOptions:
    showProvisionInfo: false
    showPulse: true
    showPercentage: true
    showErrors: true
    showSystemErrors: true
  
  serverKey: {}
  
  publishSshFailures:
    enabled: false
    subject: ssh.failures
    publicIPOnly: true
  
  # enable/disable session recording per stream type
  # requires session service to be configured
  recording:
    recordShell: false
    recordExec: false
    recordDirectTCPIP: false

  loadBalancer:
    enabled: false
    annotations: {}
    port: 22

  nodePort:
    enabled: false
    port: 30022
  
# identity is the authentication and user management service.
identity:
  replicas: 1
  image:
    repository: ghcr.io/k8shell-io/identity
    tag: pr-22-d738409

  # jwtIssuer configures JWT token issuance for k8shell services.
  jwtIssuer:
    # expiry is the lifetime of issued JWT tokens
    expiry: 60m
    # privateKey is the RSA/EC private key used to sign JWT tokens
    privateKey: {}
    # signingMethod is the algorithm used to sign JWT tokens (e.g. RS256, ES256)
    signingMethod: {}

  # kubernetes configures identity's integration with the Kubernetes API.
  kubernetes:
    # saToken configures on-demand service-account token issuance via the Kubernetes TokenRequest API.
    saToken:
      # enabled controls whether GetUserCredential issues Kubernetes service account tokens
      enabled: true
      # ttl is the requested token lifetime (minimum 10m, Kubernetes enforced)
      ttl: 1h
      # audiences are embedded in issued tokens
      audiences:
        - https://kubernetes.default.svc.cluster.local

  users:
    - username: "admin"
      uid: 1001
      gid: 1001
      fullname: "Administrator"
      email: "admin@k8shell"
      blueprints: ["*"]
      sudo: true
      shell: /bin/bash
      roles: [admin]
      organization: "default"
      password: ""  
      publicKey: ""

    # additional users can be added in the same format as above
    # - username: "alice"
    #   uid: 1002
    #   gid: 1002
    #   fullname: "Alice"
    #   email: "alice@k8shell"
    #   blueprints: ["*"]
    #   sudo: false
    #   shell: /bin/bash
    #   roles: [workspace-user]
    #   organization: "default"
    #   password: ""  
    #   publicKey: ""

  # list of remote identity providers running in the cluster that the identity
  # service can delegate authentication to. Provide the list in the following
  # format (idp-github is an example and should be replaced with the actual
  # service name of the remote provider in the cluster):
  # remoteProviders:
  #   - address: idp-github:9030
  #     serverName: idp-github.<namespace>.svc

# authz is the authorization service that evaluates OPA policies.
authz:
  enabled: false
  replicas: 1
  image:
    repository: ghcr.io/k8shell-io/authz
    tag: pr-1-9738ee7

  # policiesConfigMap is the name of an existing ConfigMap whose keys are
  # mounted as policy files into /app/policies. Leave empty to omit the mount.
  policiesConfigMap: ""

  # defaultPolicy is the inline OPA Rego policy used when no policy file matches.
  defaultPolicy: |
    package authz
    import rego.v1
    default allow = false

# provisioner manages the lifecycle of k8shell workspace pods.
provisioner:
  replicas: 1
  image:
    repository: ghcr.io/k8shell-io/provisioner
    tag: pr-40-bde095b

  # k8shelld is the default image for k8shelld defined in base blueprint
  k8shelld:
    image:
      repository: ghcr.io/k8shell-io/k8shelld
      tag: pr-63-a2556da

  # if true, the sample blueprints (samples.yaml) will be included alongside
  # the base blueprints (base.yaml). base.yaml is always included.
  includeBlueprintSamples: true

  # defaultCustomBlueprint is the default blueprint when custom blueprint 
  # does not exist in a git repository
  defaultCustomBlueprint: base

  # optional list of configmaps that provide extra files for workspace blueprints
  # their files are mounted into /app/blueprints together with blueprint-base-files
  blueprintFilesConfigMaps: []

  # targetNamespace is the namespace where provisioner will create workspaces.
  # if not set, helm chart installation will fail.
  targetNamespace: ""

  # Namespaces where workspace injection is allowed.
  # If omitted or empty, injection is disabled and all inject requests are rejected.
  # Use explicit namespace names for Role-scoped operation.
  # When you use ["*"] cluster-wide discovery/injection will be granted (ClusterRole).
  # injectNamespaces:
  #   - default

  # defaultRegistry is the default registry host for workspace images when no
  # registry is specified in a blueprint.
  defaultRegistry:
    host: ""

  # privateRegistry is a private registry with credentials for workspace images.
  # When enabled, the image pull secret will be created from the provided credentials
  privateRegistry:
    enabled: false
    host: {}
    username: {}
    password: {}
    cert: {}

  nats:
    # provisionBucketTTL is the TTL for entries in the NATS KV provisioning bucket
    provisionBucketTTL: 48h

  # shells configures PTY shell session behavior for k8shell workspaces.
  shells:
    # allowSessionDetach controls whether clients can detach from PTY shell sessions
    allowSessionDetach: false
    # detachedTTL is how long a detached session is kept alive before automatic termination
    detachedTTL: "30m"
    # allowUnlimittedTTL allows clients to set unlimited TTL for detached sessions
    allowUnlimittedTTL: false

  # saToken configures the SA token credential helper for workspace Kubernetes access.
  saToken:
    # enabled controls whether the SA token credential helper is active
    enabled: true
    # cacheTokens controls whether retrieved tokens are cached to avoid redundant API server calls
    cacheTokens: false

  # extra environment variables to inject into the provisioner pod.
  # names must not conflict with reserved variables:
  # DEFAULT_REGISTRY_HOST, PRIVATE_REGISTRY_HOST, PRIVATE_REGISTRY_USERNAME,
  # PRIVATE_REGISTRY_PASSWORD, NATS_K8SHELL_PASSWORD, JWT_SIGNING_METHOD, DEFAULT_K8SHELLD_IMAGE
  extraEnv: []
  # - name: MY_VAR
  #   value: "my-value"



# Below services are disabled in k8shell chart. They are used in k8shell-bundle
# that provides full set of k8shell services with postgresql and nats
# dependencies.

# frontend serves the k8shell web UI.
frontend:
  enabled: false
  replicas: 1
  image:
    repository: ghcr.io/k8shell-io/frontend
    tag: pr-60-7ae66ae
  scheme: "http"
  host: "localtest.me"
  sessionCookie:
    secure: false
    httpOnly: true
    sameSite: Strict
    maxAgeSeconds: 86400
    path: /api/v1
  features:
    navigation: true

# apiServer provides the k8shell REST API.
apiServer:
  enabled: false
  replicas: 1
  image:
    repository: ghcr.io/k8shell-io/api-server
    tag: v0.15.2
  logging:
    requestHeaders: false
    responseHeaders: false

# session manages terminal session state and recording.
session:
  enabled: false
  replicas: 1
  image:
    repository: ghcr.io/k8shell-io/session
    tag: v0.13.1

  # Janitor ends sessions that stop sending upserts (e.g. client killed).
  # pg_try_advisory_lock ensures only one replica runs the sweep at a time.
  janitor:
    ttl: 5m
    interval: 1m
    batchSize: 100

  # Recording stores terminal sessions as asciinema v2 (.cast) files.
  recording:
    enabled: false
    gzip: false
    persistentVolumeClaim:
      install: false
      storageClassName: ""
      size: 10Gi
      annotations: {}

# postgresql is the database backend for identity, session, and provisioner services.
postgresql:
  enabled: false
  host: "postgresql"
  port: 5432
  database: ""
  username: {}
  password: {}

# nats is the message broker used for inter-service communication and KV storage.
nats:
  enabled: false
  host: "nats"
  port: 4222
  username: "k8shell-service"
  password: {}
