{{- if .Values.sshShield.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ssh-shield
  namespace: {{ .Values.targetNamespace }}
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: 'default'
  source:
    chart: "{{ .Values.charts.sshShield.chartName }}"
    repoURL: {{ .Values.charts.sshShield.repoURL }}
    targetRevision: "{{ .Values.charts.sshShield.chartVersion }}"
    helm:
      valuesObject:
        imageRegistry:
          {{- toYaml .Values.k8shell.imageRegistry | nindent 10 }}

        {{- with .Values.sshShield }}
        replicas: {{ .replicas }}
        {{- if .image }}
        image:
          {{- toYaml .image | nindent 10 }}
        {{- end }}

        nats:
          {{- merge .nats (dict "host" $.Values.k8shell.nats.host "port" $.Values.k8shell.nats.port) | toYaml | nindent 10 }}

        blocker:
          {{- toYaml .blocker | nindent 10 }}

        plugins:
          {{- toYaml .plugins | nindent 10 }}
        {{- end }}

  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.targetNamespace }}
  {{- include "k8shell-bundle.syncPolicy" (dict "root" .) | nindent 2 }}
{{- end }}
